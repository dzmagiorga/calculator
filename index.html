<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

    <div id="calculator">
        <div id="display"></div>
        <div id="buttons">
            <div class="Numbers">
                <div id="9">9</div>
                <div id="8">8</div>
                <div id="7">7</div>
                <div id="6">6</div>
                <div id="5">5</div>
                <div id="4">4</div>
                <div id="3">3</div>
                <div id="2">2</div>
                <div id="1">1</div>
                <div id="0">0</div>
                <div id=".">.</div>
                <div id="clear">C</div>
            </div>
            <div class="Operators">
                <div id="*">x</div>
                <div id="/">÷</div>
                <div id="+">+</div>
                <div id="-">-</div>
            </div>
        </div>
    </div>

</body>
</html>
